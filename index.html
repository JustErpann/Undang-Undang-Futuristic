* { box-sizing: border-box; }
body{margin:0;font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background:#0a0f1f;color:#bcd3ff;overflow-x:hidden;}
header{text-align:center;padding:25px 15px;background:#0d1b3d;position:relative;border-bottom:2px solid #00eaff;box-shadow:0 0 20px rgba(0,234,255,0.3);}

header p{margin:5px 0;font-size:14px;opacity:0.8;color:#9fb9ff;font-weight:bold;}
.container{display:flex;min-height:calc(100vh - 120px);}
.content{flex:1;padding:25px;margin-right:310px;transition: all 0.3s ease;}

/* GUI LOGO KUSTOM DENGAN ANIMASI PREMIUM */
.logo-container {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 5px;
    margin-bottom: 10px;
}
.logo-custom {
    width: 105px;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 12px rgba(0, 234, 255, 0.6));
    animation: pulseGlow 3.5s infinite ease-in-out;
}

@keyframes pulseGlow {
    0% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(0, 234, 255, 0.6)); }
    50% { transform: scale(1.04); filter: drop-shadow(0 0 22px rgba(0, 234, 255, 0.9)); }
    100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(0, 234, 255, 0.6)); }
}

/* SIDEBAR GUI */
.sidebar{
width:300px;
background:rgba(13,27,61,0.93);
backdrop-filter: blur(15px);
padding:20px;
position:fixed;
right:0;
top:0;
height:100%;
border-left:2px solid rgba(0,234,255,0.4);
box-shadow: -8px 0 30px rgba(0,0,0,0.7);
display:flex;
flex-direction:column;
justify-content:space-between;
box-sizing: border-box;
z-index: 100;
}

/* DROPDOWN DENGAN CIRI ANIMASI ULTRA SMOOTH DAN ELASTIS */
.dropdown{margin-bottom:18px;background:#111a33;border-radius:12px;overflow:hidden;border:1px solid rgba(0,234,255,0.1);transition: border-color 0.4s ease, box-shadow 0.4s ease;}
.dropdown:hover { border-color: rgba(0,234,255,0.3); }

.dropdown-header{
padding:15px;
background:#16244d;
cursor:pointer;
font-weight:bold;
color:#00eaff;
text-shadow:0 0 5px rgba(0,234,255,0.4);
display:flex;
justify-content:space-between;
align-items:center;
transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
}
.dropdown-header:hover{
background:#1f3570;
box-shadow: inset 0 0 10px rgba(0,234,255,0.2);
color:#fff;
}

.dropdown-body{
padding: 0 15px;
background:#0c1326;
max-height: 0;
overflow: hidden;
transition: max-height 0.6s cubic-bezier(0.25, 1, 0.5, 1), padding 0.4s ease, opacity 0.4s ease;
opacity: 0;
}

.dropdown.active {
    border-color: rgba(0,234,255,0.5);
    box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}
.dropdown.active .dropdown-body {
max-height: 2500px;
padding: 15px;
opacity: 1;
transition: max-height 0.7s cubic-bezier(0.25, 1, 0.5, 1), padding 0.3s ease, opacity 0.5s ease;
}

.dropdown-header .arrow-icon {
font-size: 12px;
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s ease;
display: inline-block;
color: #00eaff;
}
.dropdown.active .dropdown-header .arrow-icon {
transform: rotate(90deg);
color: #fff;
}

/* CARD LIST PASAL */
.card{
background:#1a2a5a;
margin:10px 0;
padding:14px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
border-left:4px solid #00eaff;
transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease, background 0.3s ease;
}
.card:hover{
transform: scale(1.02) translateX(3px);
box-shadow: 0 4px 12px rgba(0,234,255,0.25);
background: #22397a;
}

.info{max-width:85%;font-size:14px;color:#c9dcff;line-height:1.4;}
.info strong{color:#ffffff; font-size:14.5px;}
.info .meta{font-size:12px;color:#00eaff;margin-top:6px;font-weight:600;}

.checkbox{
width:23px;
height:23px;
cursor:pointer;
accent-color:#00eaff;
margin-left:10px;
transition: transform 0.2s ease;
}
.checkbox:hover { transform: scale(1.15); }

.list{max-height:260px;overflow-y:auto;margin-top:10px;background:#111a33;padding:12px;border-radius:8px;color:#cfe2ff;font-size:13px;border:1px solid rgba(0,234,255,0.2);line-height:1.45;scrollbar-width: thin;scrollbar-color: #00eaff #111a33;}
.list div{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.06);animation: fadeInItem 0.3s ease forwards;}

@keyframes fadeInItem {
    from { opacity: 0; transform: translateY(-5px); }
    to { opacity: 1; transform: translateY(0); }
}

input[type="text"]{width:100%;padding:13px 16px;margin-bottom:22px;border-radius:8px;border:1px solid rgba(0,234,255,0.3);background:#16244d;color:#cfe2ff;font-size:15px;box-shadow:inset 0 0 5px rgba(0,0,0,0.5);transition: all 0.3s ease;}
input[type="text"]:focus{outline:none;border-color:#00eaff;box-shadow:0 0 12px rgba(0,234,255,0.6), inset 0 0 3px rgba(0,0,0,0.2); background:#1a2b5c;}

.btn-control {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 7px;
    font-weight: bold;
    font-size: 13px;
    cursor:pointer;

.btn-reset:hover {

.btn-close-menus {

    c.innerHTML = "";
    
    Object.keys(data).forEach(k => {
        let filteredPasal = data[k].filter(p => p.nama.toLowerCase().includes(filter) || p.kode.includes(filter));
        
        if (filteredPasal.length === 0 && filter !== "") return;
        
        let isPreviouslyActive = false;
        const existingDropdowns = document.querySelectorAll('.dropdown');
        existingDropdowns.forEach(d => {
            if (d.querySelector('.dropdown-header').innerText.includes(k) && d.classList.contains('active')) {
                isPreviouslyActive = true;
            }
        });

        let activeClass = isPreviouslyActive ? "active" : "";
        
        let html = `<div class="dropdown ${activeClass}"><div class="dropdown-header" onclick="toggle(this)">${k} (${filteredPasal.length}) <span class="arrow-icon">▶</span></div><div class="dropdown-body">`;
        
        filteredPasal.forEach(p => {
            const isChecked = selectedMap[p.id_pasal] ? "checked" : "";
            
            html += `<div class="card">
            <div class="info">
                <strong>Pasal ${p.kode} - ${p.nama}</strong>
                <div class="meta">Denda: ${formatDenda(p.denda)} | Hukuman: ${p.penjara}</div>
            </div>
            <input type="checkbox" id="chk_${p.id_pasal}" class="checkbox" ${isChecked} onchange="handleCheckboxChange('${p.id_pasal}', this.checked)">
            </div>`;
        });
        
        html += `</div></div>`;
        c.innerHTML += html;
    });
}

function toggle(el) {
    let parentDropdown = el.parentElement;
    parentDropdown.classList.toggle("active");
}

function handleCheckboxChange(id_pasal, isChecked) {
    const item = flatData[id_pasal];
    if (!item) return;
    
    const targets = [id_pasal, ...item.link_with];
    
    targets.forEach(tgtId => {
        const tgtItem = flatData[tgtId];
        if (!tgtItem) return;
        
        if (isChecked) {
            selectedMap[tgtId] = tgtItem;
        } else {
            delete selectedMap[tgtId];
        }
        
        const el = document.getElementById("chk_" + tgtId);
        if (el) el.checked = isChecked;
    });
    
    renderSelected();
    updateTotals();
}

function renderSelected() {
    let list = document.getElementById("selected");
    list.innerHTML = "";
    
    let keys = Object.keys(selectedMap);
    if (keys.length === 0) {
        list.innerHTML = "<em>Belum ada pasal yang dipilih</em>";
        return;
    }
    
    let displayedCodes = [];
    
    keys.forEach(k => {
        let currentPasal = selectedMap[k];
        let uniqueKey = currentOriginalKey(currentPasal);
        
        if (!displayedCodes.includes(uniqueKey)) {
            displayedCodes.push(uniqueKey);
            
            let catText = currentPasal.kategori.includes("SATLANTAS") ? "🚨 Satlantas" : "⚖️ Kepolisian";
            if(currentPasal.link_with.length > 0) {
                catText = "🔗 Pas Bersama";
            }
            
            list.innerHTML += `<div>[${catText}] <strong>Pasal ${currentPasal.kode}</strong> - ${currentPasal.nama}</div>`;
        }
    });
}

function currentOriginalKey(pasalObj) {
    return pasalObj.kode + "_" + pasalObj.nama.trim().toLowerCase();
}

function updateTotals() {
    let totalDendaNum = 0;
    let specialDenda = [];
    let prisonTerms = [];
    let specialPrison = [];
    
    const activeIds = Object.keys(selectedMap);
    
    activeIds.forEach(id => {
        const item = selectedMap[id];
        
        let skipCalculation = false;
        if (item.kategori.includes("PASAL RINGAN") || item.kategori.includes("PASAL BERAT")) {
            item.link_with.forEach(linkId => {
                if (linkId.includes("satlantas") && activeIds.includes(linkId)) {
                    skipCalculation = true; 
                }
            });
        }
        
        if (skipCalculation) return; 
        
        let dVal = parseInt(item.denda);
        if (isNaN(dVal)) {
            if (!specialDenda.includes(item.denda)) specialDenda.push(item.denda);
        } else {
            totalDendaNum += dVal;
        }
        
        let pStr = item.penjara.toLowerCase();
        if (pStr.includes("bulan")) {
            let months = parseInt(pStr.match(/\d+/));
            if (!isNaN(months)) {
                prisonTerms.push(months);
            } else {
                if (!specialPrison.includes(item.penjara)) specialPrison.push(item.penjara);
            }
        } else {
            if (item.penjara !== "-") {
                if (!specialPrison.includes(item.penjara)) specialPrison.push(item.penjara);
            }
        }
    });
    
    let dendaText = "";
    if (totalDendaNum > 0 || specialDenda.length === 0) {
        dendaText = "$" + totalDendaNum.toLocaleString('id-ID');
    }
    if (specialDenda.length > 0) {
        if (totalDendaNum > 0) dendaText += " + ";
        dendaText += specialDenda.join(" & ");
    }
    document.getElementById("denda").innerText = dendaText;
    
    let totalMonths = prisonTerms.reduce((a, b) => a + b, 0);
    let prisonText = "";
    if (totalMonths > 0) {
        prisonText = totalMonths + " Bulan";
    }
    if (specialPrison.length > 0) {
        if (totalMonths > 0) prisonText += " + ";
        prisonText += specialPrison.join(" / ");
    }
    if (prisonText === "") {
        prisonText = "0 Bulan";
    }
    document.getElementById("penjara").innerText = prisonText;
}

function resetCalculatorOnly() {
    selectedMap = {};
    document.getElementById("selected").innerHTML = "<em>Belum ada pasal yang dipilih</em>";
    document.getElementById("denda").innerText = "$0";
    document.getElementById("penjara").innerText = "0 Bulan";
    
    const checkboxes = document.querySelectorAll('.checkbox');
    checkboxes.forEach(cb => cb.checked = false);
}

function closeAllDropdowns() {
    const dropdowns = document.querySelectorAll('.dropdown');
    dropdowns.forEach(d => {
        d.classList.remove("active");
    });
}

const s = document.getElementById("search");
s.addEventListener("keyup", () => render(s.value.toLowerCase()));

render();
</script>
</body>
</html>
